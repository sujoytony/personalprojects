<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Tony's TMS</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%}
    body{background:#070B14;color:#E2EAF4;font-family:system-ui,sans-serif}
    #err{display:none;position:fixed;inset:0;background:#070B14;color:#F43F5E;padding:28px 32px;font-family:monospace;font-size:13px;overflow:auto;z-index:9999;white-space:pre-wrap;line-height:1.7}
    #err h2{font-size:18px;margin-bottom:16px;color:#ff6b6b;font-family:system-ui}
    #err .hint{color:#8A9BB5;font-size:12px;margin-top:20px;border-top:1px solid #1C2E47;padding-top:14px}
    #loading{position:fixed;inset:0;background:#070B14;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:100}
    #loading .label{font-size:11px;letter-spacing:0.15em;color:#2A9FD6;font-family:system-ui}
    #loading .bar{width:200px;height:2px;background:#1C2E47;border-radius:2px;overflow:hidden}
    #loading .bar-fill{height:100%;background:#2A9FD6;border-radius:2px;animation:load 1.4s ease-in-out infinite}
    @keyframes load{0%{width:0;margin-left:0}50%{width:100%;margin-left:0}100%{width:0;margin-left:100%}}
  </style>
</head>
<body>
<div id="loading">
  <div style="font-size:36px">&#128666;</div>
  <div class="label">TONY'S TMS &mdash; LOADING</div>
  <div class="bar"><div class="bar-fill"></div></div>
</div>
<div id="root"></div>
<div id="err"></div>
<script>
function showError(title, detail, hint) {
  var d = document.getElementById('err');
  document.getElementById('loading').style.display = 'none';
  d.style.display = 'block';
  d.innerHTML = '<h2>' + title + '</h2><pre>' +
    String(detail).replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</pre>' +
    (hint ? '<div class="hint">' + hint + '</div>' : '');
}
window.onerror = function(msg, src, line, col, err) {
  var d = 'Message: ' + msg + '\nFile: ' + (src||'(inline)') + '\nLine: ' + line;
  if (err && err.stack) d += '\n\n' + err.stack;
  showError('JavaScript Error', d, 'Try uploading index.html directly to tiiny.host');
  return true;
};
window.addEventListener('unhandledrejection', function(e) {
  showError('Async Error', e.reason ? (e.reason.stack || e.reason.message || String(e.reason)) : 'unknown');
});
</script>
